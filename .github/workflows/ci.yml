name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint · Typecheck · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Notify Slack — CI Started
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            EVENT="${{ github.event_name }}"
            BRANCH="${{ github.ref_name }}"
            COMMIT="${{ github.sha }}"
            SHORT_SHA="${COMMIT:0:7}"
            ACTOR="${{ github.actor }}"
            RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            curl -s -X POST "$SLACK_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{
                \"attachments\": [{
                  \"color\": \"#3aa3e3\",
                  \"title\": \"⏳ Vently CI Started\",
                  \"text\": \"Build kicked off for *${BRANCH}* by *${ACTOR}*\",
                  \"fields\": [
                    {\"title\": \"Event\", \"value\": \"${EVENT}\", \"short\": true},
                    {\"title\": \"Commit\", \"value\": \"${SHORT_SHA}\", \"short\": true},
                    {\"title\": \"Run\", \"value\": \"<${RUN_URL}|View on GitHub>\", \"short\": false}
                  ],
                  \"footer\": \"Vently CI Bot\",
                  \"ts\": $(date +%s)
                }]
              }"
          fi

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @vently/shared prisma:generate

      - name: Validate Prisma schema
        run: pnpm --filter @vently/shared prisma:validate
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder

      - name: Build Shared Packages
        run: pnpm --filter @vently/shared build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          REDIS_URL: redis://localhost:6379
          NEXT_PUBLIC_API_URL: http://localhost:4000/api
          NEXT_PUBLIC_SOCKET_URL: http://localhost:4000
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: placeholder_vapid_key_for_build

      - name: Prettier check
        run: pnpm format:check

      - name: Notify Slack — CI Success
        if: success()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            BRANCH="${{ github.ref_name }}"
            ACTOR="${{ github.actor }}"
            SHORT_SHA="${{ github.sha }}"
            SHORT_SHA="${SHORT_SHA:0:7}"
            RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            curl -s -X POST "$SLACK_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{
                \"attachments\": [{
                  \"color\": \"#2eb886\",
                  \"title\": \"✅ Vently CI Passed\",
                  \"text\": \"All checks passed on *${BRANCH}* — Lint, Typecheck, Build, Prettier ✓\",
                  \"fields\": [
                    {\"title\": \"Branch\", \"value\": \"${BRANCH}\", \"short\": true},
                    {\"title\": \"Commit\", \"value\": \"${SHORT_SHA}\", \"short\": true},
                    {\"title\": \"Triggered by\", \"value\": \"${ACTOR}\", \"short\": true},
                    {\"title\": \"Run\", \"value\": \"<${RUN_URL}|View on GitHub>\", \"short\": true}
                  ],
                  \"footer\": \"Vently CI Bot\",
                  \"ts\": $(date +%s)
                }]
              }"
          fi

      - name: Notify Slack — CI Failed
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            BRANCH="${{ github.ref_name }}"
            ACTOR="${{ github.actor }}"
            SHORT_SHA="${{ github.sha }}"
            SHORT_SHA="${SHORT_SHA:0:7}"
            RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            curl -s -X POST "$SLACK_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{
                \"attachments\": [{
                  \"color\": \"#a30200\",
                  \"title\": \"❌ Vently CI Failed\",
                  \"text\": \"Build failed on *${BRANCH}* — check the logs immediately!\",
                  \"fields\": [
                    {\"title\": \"Branch\", \"value\": \"${BRANCH}\", \"short\": true},
                    {\"title\": \"Commit\", \"value\": \"${SHORT_SHA}\", \"short\": true},
                    {\"title\": \"Triggered by\", \"value\": \"${ACTOR}\", \"short\": true},
                    {\"title\": \"View Logs\", \"value\": \"<${RUN_URL}|Open GitHub Actions>\", \"short\": true}
                  ],
                  \"footer\": \"Vently CI Bot\",
                  \"ts\": $(date +%s)
                }]
              }"
          fi
