name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  api:
    name: Deploy API → Railway
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Gate on the secret existing so unconfigured forks don't fail noisily.
    if: ${{ (github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success') && (vars.DEPLOY_ENABLED == 'true' || github.repository == 'praveen202105/Vently') }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @vently/shared prisma:generate
      - run: pnpm --filter @vently/shared build
      - run: pnpm --filter @vently/api build

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Skip if RAILWAY_TOKEN not configured
        id: gate
        run: |
          if [ -z "${{ secrets.RAILWAY_TOKEN }}" ]; then
            echo "::warning::RAILWAY_TOKEN secret is not set — skipping deploy. Add it at https://github.com/${{ github.repository }}/settings/secrets/actions"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Ensure AI fallback production variables
        if: steps.gate.outputs.skip != 'true'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if ! railway variable set \
            --project 5089630a-4313-46f8-bab8-7051c52b42f1 \
            --environment production \
            --service api \
            --skip-deploys \
            AI_FALLBACK_ENABLED=true \
            AI_FALLBACK_MS=8000 \
            AI_FALLBACK_TEST_MODE=false; then
            echo "::warning::Could not update AI fallback variables; continuing with existing Railway variables."
          fi

      - name: Deploy to Railway
        if: steps.gate.outputs.skip != 'true'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --project 5089630a-4313-46f8-bab8-7051c52b42f1 --environment production --service api --detach -m "Deploy ${{ github.event.workflow_run.head_sha || github.sha }}"

      - name: Notify Slack on deploy
        if: steps.gate.outputs.skip != 'true' && always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            exit 0
          fi
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            TITLE="🚂 Railway API deploy ✅"
            COLOR="#2eb886"
          else
            TITLE="🚂 Railway API deploy ❌"
            COLOR="#a30200"
          fi
          curl -sS -X POST -H 'Content-Type: application/json' "$SLACK_WEBHOOK_URL" -d "{
            \"attachments\": [{
              \"color\": \"$COLOR\",
              \"title\": \"$TITLE\",
              \"text\": \"Commit ${{ github.event.workflow_run.head_sha || github.sha }} deployed after CI passed\",
              \"footer\": \"Vently CI/CD Bot\",
              \"ts\": $(date +%s)
            }]
          }"

      - name: Wait for Vercel web deploy
        if: steps.gate.outputs.skip != 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_GIT_COMMIT_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
          VERCEL_PROD_URL: https://vently-web-gamma.vercel.app
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
        run: node scripts/wait-vercel-deploy.js

  # Web is still deployed by Vercel's git integration; the workflow only polls
  # the Vercel API so Slack and downstream prod verification wait for it.
