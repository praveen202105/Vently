name: Vently E2E Verification & CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  repository_dispatch:
    types: [verify_pipeline]
  workflow_dispatch:

jobs:
  verify:
    name: Verify & Deploy smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.branch || github.ref || 'main' }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node.js (v20)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client & Build Shared Packages
        run: |
          pnpm --filter @vently/shared prisma generate
          pnpm --filter @vently/shared build

      - name: Install Playwright Browsers with dependencies
        run: pnpm --filter @vently/web exec playwright install chromium --with-deps

      - name: Run Monorepo Verification Pipeline
        env:
          FORCE_COLOR: '1'
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          CI: 'true'
          NEXT_PUBLIC_API_URL: http://localhost:4000/api
          NEXT_PUBLIC_SOCKET_URL: http://localhost:4000
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: placeholder_vapid_key_for_build
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          REDIS_URL: redis://localhost:6379
        # Run local verification only on pull requests (since deployment is not live yet)
        # On push to main, run full local & prod smoke tests
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            node scripts/verify-feature.js --local-only
          else
            # Push to main: runs full pipeline.
            # Note: For fully unattended CI runs, we can bypass the interactive deployment wait.
            node scripts/verify-feature.js --ci
          fi
