services:
  postgres:
    image: postgres:16-alpine
    container_name: vently-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: vently
      POSTGRES_PASSWORD: vently_dev
      POSTGRES_DB: vently
    ports:
      - "5432:5432"
    volumes:
      - vently_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vently"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vently-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - vently_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  vently_pg_data:
  vently_redis_data:
