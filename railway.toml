# Railway service config for the Vently API.
# Tells Railway to build from the monorepo Dockerfile (not Nixpacks) so the
# pnpm workspace resolution works.
#
# Build context is the repo root (Railway sets that when --root is set on the
# service, or via the Settings → Source dialog: root = "/").

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/api/Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
